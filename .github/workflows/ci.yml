name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test-default:
    name: test (default) ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  test-minimal:
    name: test (minimal, zero-native-dep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --no-default-features --features render-native

  render-pdfium:
    name: render-pdfium build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The PDFIUM library binds at runtime, so this only proves the backend
      # compiles; rendering with it requires scripts/fetch-pdfium.sh.
      - run: cargo build -p pdfkit-render -p pdfkit-cli --features render-pdfium

  wasm-build:
    name: wasm build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0
      - uses: Swatinem/rust-cache@v2
      - run: wasm-pack build crates/pdfkit-wasm
      - run: wasm-pack test --headless --firefox crates/pdfkit-wasm

  msrv:
    name: msrv build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.82.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  fuzz:
    name: fuzz (build + smoke)
    runs-on: ubuntu-latest
    # cargo-fuzz manages its own (sanitizer) RUSTFLAGS; don't impose -D warnings.
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      # Compile the harness (keeps it from rotting), then a short seeded run as a
      # regression smoke test. Deep campaigns are on demand (see fuzz/README.md).
      - run: cargo fuzz build parse
      - run: |
          mkdir -p fuzz/corpus/parse
          cp fixtures/*.pdf fuzz/corpus/parse/
          cargo fuzz run parse -- -max_total_time=60 -timeout=10 -rss_limit_mb=4096
